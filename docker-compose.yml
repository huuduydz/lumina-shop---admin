version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: lumina_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumina_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lumina_backend
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/lumina_crm}
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - lumina_network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  lumina_network:
    driver: bridge
